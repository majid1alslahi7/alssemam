<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - شركة السمام</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1F4E79, #4A9FE5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-container {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 25px 40px rgba(0,0,0,0.25);
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            background: #f0f7ff;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            margin-left: auto;
            margin-right: auto;
        }
        h1 {
            color: #1F4E79;
            margin-bottom: 15px;
            font-size: 1.8rem;
            font-weight: 700;
        }
        p {
            color: #4a5568;
            margin-bottom: 25px;
            line-height: 1.7;
            font-size: 1rem;
        }
        .btn-retry {
            background: #1F4E79;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(31,78,121,0.2);
            transition: background 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .btn-retry:hover {
            background: #163A5F;
        }
        .contact-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.9rem;
            color: #718096;
            direction: ltr;
        }
        .contact-info span {
            direction: rtl;
            display: inline-block;
        }
        .brand {
            font-weight: 700;
            color: #1F4E79;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>أنت غير متصل بالإنترنت</h1>
        <p>عذراً، لا يمكننا تحميل المحتوى حالياً. يرجى التحقق من اتصالك بالإنترنت والمحاولة مرة أخرى.</p>
        <button class="btn-retry" onclick="location.reload()">🔄 إعادة المحاولة</button>
        <div class="contact-info">
            <div class="brand">شركة السمام</div>
            <span>📧 info@alssemam.com &nbsp;|&nbsp; 📞 +967 715122500</span>
        </div>
    </div>
</body>
</html>
